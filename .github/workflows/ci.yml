name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: |
          npm ci

      - name: Run Lint
        run: |
          npm run lint:check

  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: |
          npm ci

      - name: Run Tests
        run: |
          npm test

  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: |
          npm ci

      - name: Run Build
        run: |
          npm run build

      - name: Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: build-result
          path: |
            .scaffold/build/*.xpi

  # Cross-repo shared-file drift check (PLAN 7.5c): endpoints.json and the
  # formatter parity fixtures are canonical here and byte-copied to the
  # sibling repos. A red job here means someone changed a shared file without
  # running scripts/sync-endpoints.sh (or the sibling hasn't been pushed yet).
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Re-clone + re-check with retries: a shared-file change lands here first
      # and in the siblings seconds later, so a single clone can read a stale
      # sibling and false-red. A REAL drift persists across all attempts; a
      # push-race resolves once the sibling commit is visible.
      - name: Verify shared files are in sync
        run: |
          attempt() {
            rm -rf ../CrispLib ../citer
            git clone --depth 1 https://github.com/CrispStrobe/CrispLib ../CrispLib
            git clone --depth 1 https://github.com/CrispStrobe/citer ../citer
            scripts/sync-endpoints.sh --check
          }
          for i in 1 2 3; do
            if attempt; then exit 0; fi
            echo "::warning::sync-check attempt $i failed (siblings may be mid-push); retrying in 45s"
            sleep 45
          done
          echo "::error::shared files still out of sync after 3 attempts — real drift"
          exit 1
